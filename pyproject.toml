[tool.poetry]
name = "telephonia"
version = "1.2.0"
description = "Generateur de bandes sonores SVI (Serveur Vocal Interactif) par IA via ElevenLabs"
authors = ["stephanejouve <stephanejouve@users.noreply.github.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "telephonia", from = "src"}]

[tool.poetry.scripts]
telephonia = "telephonia.generator:main"
telephonia-web = "telephonia.web.app:main"
g729towav = "telephonia.converter:main"

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
requests = ">=2.31"
pydub = ">=0.25"
keyring = ">=25.0"
fastapi = ">=0.115"
uvicorn = {version = ">=0.34", extras = ["standard"]}
edge-tts = ">=6.1"
audioop-lts = {version = ">=0.2.1", python = ">=3.13"}
python-multipart = "^0.0.22"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=4.0"
black = ">=24.0"
ruff = ">=0.4"
isort = ">=5.12"
httpx = ">=0.28"
pre-commit = ">=3.0"
pyinstaller = {version = ">=6.0", python = ">=3.11,<3.15"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.isort]
profile = "black"
line_length = 100

[tool.semantic_release]
version_toml = ["pyproject.toml:tool.poetry.version"]
version_variables = ["src/telephonia/__init__.py:__version__"]
commit_parser = "conventional"
tag_format = "v{version}"
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.remote]
type = "github"
name = "origin"
token = { env = "GH_TOKEN" }

[tool.pytest.ini_options]
testpaths = ["tests"]
