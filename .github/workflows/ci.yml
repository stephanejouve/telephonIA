name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check formatting (Black)
        run: poetry run black src/ tests/ --check --line-length=100

      - name: Check imports (isort)
        run: poetry run isort src/ tests/ --check-only --profile black --line-length=100

      - name: Lint (Ruff)
        run: poetry run ruff check src/

      - name: Run tests
        run: poetry run pytest tests/ -v --cov=telephonia --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: stephanejouve/telephonIA

  # Vérifie que telephonIA.spec raise FileNotFoundError quand
  # scripts/ffmpeg/ est absent — régression de la classe du bug beta-test
  # Windows (silent skip → .exe cassé). Le job échoue si pyinstaller réussit
  # (= garde-fou absent) et réussit si il échoue avec le bon message.
  spec-guardrail-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Spec must raise on missing ffmpeg
        shell: pwsh
        run: |
          if (Test-Path scripts/ffmpeg) {
            Remove-Item -Recurse -Force scripts/ffmpeg
          }
          $out = pyinstaller --noconfirm --distpath dist-ci --workpath build-ci telephonIA.spec 2>&1
          $code = $LASTEXITCODE
          $out | Out-Host
          if ($code -eq 0) {
            Write-Error "pyinstaller a produit un .exe sans ffmpeg.exe — le garde-fou est cassé."
            exit 1
          }
          if ($out -match "Binaires ffmpeg/ffprobe manquants") {
            Write-Host "OK — garde-fou déclenché comme prévu."
            exit 0
          }
          Write-Error "pyinstaller a échoué mais pas pour la bonne raison — revoir le spec."
          exit 1

  # Sanity py2app sur macOS : ffmpeg+ffprobe via brew puis --help-commands
  # (parse le setup.py, pas de full build).
  py2app-sanity-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg + py2app
        run: |
          brew install ffmpeg
          pip install py2app
      - name: py2app config parse
        run: python macos/py2app_setup.py --help-commands | head -20
